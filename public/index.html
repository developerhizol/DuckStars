<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отзывы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0F0F11;
            color: white;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: 16px;
        }
        
        .emoji-gif {
            width: 36px;
            height: 36px;
            object-fit: contain;
            flex-shrink: 0;
        }
        
        .empty-gif {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin: 0 auto 16px;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
        
        .tab-active {
            background-color: #FFD633;
            color: #111;
        }
        
        .tab-inactive {
            background-color: #1C1C1E;
            color: white;
        }
        
        .badge-active {
            background-color: #E4BE29;
            color: #111;
        }
        
        .badge-positive {
            background-color: #1A2F22;
            color: #4ADE80;
        }
        
        .badge-negative {
            background-color: #321A1A;
            color: #F87171;
        }
        
        .card-border {
            border: 1px solid #304D36;
        }
        
        .pagination-btn {
            background: #1C1C1E;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            min-width: 40px;
            text-align: center;
        }
        
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .pagination-btn.active {
            background: #FFD633;
            color: #111;
        }

        .rating-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            width: 100%;
        }
        
        .rating-btn.good {
            background: #1A2F22;
            color: #4ADE80;
            border-color: #4ADE80;
        }
        
        .rating-btn.good.selected {
            background: #4ADE80;
            color: #111;
        }
        
        .rating-btn.bad {
            background: #321A1A;
            color: #F87171;
            border-color: #F87171;
        }
        
        .rating-btn.bad.selected {
            background: #F87171;
            color: #111;
        }
        
        .rating-btn:active {
            transform: scale(0.96);
        }

        textarea {
            background: #1C1C1E;
            border: 1px solid #304D36;
            border-radius: 12px;
            color: white;
            padding: 12px;
            width: 100%;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            font-size: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #FFD633;
        }

        .submit-btn {
            background: #FFD633;
            color: #111;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        .submit-btn:active {
            transform: scale(0.96);
        }
        
        .submit-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgMain: '#0F0F11',
                        yellowBtn: '#FFD633',
                        yellowTab: '#FFD633',
                        yellowBadge: '#E4BE29',
                        tabBg: '#1C1C1E',
                        cardBg: '#151618',
                        cardBorder: '#304D36',
                        textGray: '#72767A',
                        statusBg: '#1A2F22',
                        statusText: '#4ADE80',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="app" class="w-full max-w-[480px] mx-auto flex flex-col gap-4">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const userId = urlParams.get('user_id');
        const purchaseId = urlParams.get('purchase_id');

        const API_BASE = 'https://duckstars.bothost.tech';
        const REVIEWS_WEBAPP_URL = 'https://duckstars.bothost.tech/';

        const TYPE_GIFS = {
            'stars': '/public/stars.gif',
            'premium': '/public/premium.gif',
            'gift': '/public/delete_gift.gif'
        };

        let currentTab = 'all';
        let currentPage = 1;
        let totalPages = 1;
        let selectedRating = null;

        function getTypeGif(type) {
            return TYPE_GIFS[type] || '/public/stars.gif';
        }

        function renderReviewForm() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <button class="w-full bg-yellowBtn text-black font-semibold text-[17px] py-3.5 rounded-[14px] cursor-default">
                    ✍️ Оставить отзыв
                </button>
                
                <div class="bg-cardBg border card-border rounded-[20px] p-5 flex flex-col gap-4">
                    <p class="text-textGray text-sm text-center">Выберите оценку:</p>
                    
                    <div class="flex gap-3">
                        <button class="rating-btn good" onclick="selectRating('good')">
                            👍 Хорошо
                        </button>
                        <button class="rating-btn bad" onclick="selectRating('bad')">
                            👎 Плохо
                        </button>
                    </div>
                    
                    <div id="rating-status" class="text-center text-sm text-textGray min-h-[20px]"></div>
                    
                    <textarea id="review-text" placeholder="Расскажите подробнее о вашем опыте... (необязательно)"></textarea>
                    
                    <button class="submit-btn" id="submit-review" onclick="submitReview()" disabled>
                        ✍️ Отправить отзыв
                    </button>
                </div>
                
                <button onclick="goToReviews()" class="text-textGray text-center text-sm py-2">
                    ← Назад к отзывам
                </button>
            `;
        }

        function selectRating(rating) {
            selectedRating = rating;
            const goodBtn = document.querySelector('.rating-btn.good');
            const badBtn = document.querySelector('.rating-btn.bad');
            const status = document.getElementById('rating-status');
            const submitBtn = document.getElementById('submit-review');
            
            goodBtn.classList.remove('selected');
            badBtn.classList.remove('selected');
            
            if (rating === 'good') {
                goodBtn.classList.add('selected');
                status.textContent = '✅ Вы выбрали: Хорошо';
                status.style.color = '#4ADE80';
            } else {
                badBtn.classList.add('selected');
                status.textContent = '✅ Вы выбрали: Плохо';
                status.style.color = '#F87171';
            }
            
            submitBtn.disabled = false;
        }

        async function submitReview() {
            if (!selectedRating) return;
            
            const text = document.getElementById('review-text').value.trim();
            const submitBtn = document.getElementById('submit-review');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';
            
            try {
                const response = await fetch(`${API_BASE}/api/submit_review`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        purchase_id: purchaseId,
                        rating: selectedRating === 'good' ? 5 : 1,
                        text: text || 'Без комментария'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('rating-status').textContent = '✅ Отзыв успешно отправлен! Спасибо!';
                    document.getElementById('rating-status').style.color = '#4ADE80';
                    submitBtn.textContent = '✅ Отправлено';
                    
                    setTimeout(() => {
                        window.location.href = REVIEWS_WEBAPP_URL;
                    }, 1500);
                } else {
                    alert('Ошибка при отправке отзыва: ' + data.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '✍️ Отправить отзыв';
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '✍️ Отправить отзыв';
            }
        }

        function goToReviews() {
            window.location.href = REVIEWS_WEBAPP_URL;
        }

        async function loadReviews(tab, page) {
            const params = new URLSearchParams({
                tab: tab,
                page: page,
                limit: 5
            });
            
            try {
                const response = await fetch(`${API_BASE}/api/reviews?${params}`);
                const data = await response.json();
                
                totalPages = data.total_pages || 1;
                renderReviews(data.reviews || []);
                updatePagination();
                updateCounts(data.counts || { all: 0, positive: 0, negative: 0 });
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                document.getElementById('reviews-container').innerHTML = `
                    <div class="text-center text-textGray py-8">
                        <p>Ошибка загрузки отзывов</p>
                    </div>
                `;
            }
        }

        function renderReviews(reviews) {
            const container = document.getElementById('reviews-container');
            
            if (!reviews || reviews.length === 0) {
                let emptyGif = '/public/cry.gif';
                let emptyText = 'ОТЗЫВОВ ПОКА ЧТО НЕТ, НО ЭТО ПОКА';
                
                if (currentTab === 'positive') {
                    emptyGif = '/public/cry.gif';
                    emptyText = 'ПОЛОЖИТЕЛЬНЫХ ОТЗЫВОВ НЕТ :(';
                } else if (currentTab === 'negative') {
                    emptyGif = '/public/fun.gif';
                    emptyText = 'ОТРИЦАТЕЛЬНЫХ ОТЗЫВОВ НЕТ :)';
                }
                
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12">
                        <img src="${emptyGif}" alt="empty" class="empty-gif">
                        <p class="text-textGray text-center text-sm font-semibold">${emptyText}</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            reviews.forEach(review => {
                const typeGif = getTypeGif(review.type);
                const isGift = review.type === 'gift';
                let displayItem = review.item;
                
                const statusText = review.rating >= 4 ? 'ХОРОШО' : 'ПЛОХО';
                const statusColor = review.rating >= 4 ? '#4ADE80' : '#F87171';
                
                html += `
                    <div class="bg-cardBg border card-border rounded-[20px] p-4 flex flex-col">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3 pr-2">
                                ${isGift ? 
                                    `<img src="/public/delete_gift.gif" alt="gift" class="emoji-gif">` :
                                    `<img src="${typeGif}" alt="icon" class="emoji-gif">`
                                }
                                <span class="text-textGray font-bold text-[11px] uppercase tracking-wider leading-tight">${displayItem}</span>
                            </div>
                            <div class="bg-statusBg flex items-center gap-1 px-2 py-1 rounded-[6px] shrink-0">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${statusColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                                <span class="text-[10px] font-bold tracking-wide" style="color: ${statusColor}">${statusText}</span>
                            </div>
                        </div>
                        <div class="text-[15px] font-bold text-white mt-3 leading-snug">${review.text}</div>
                        <div class="flex justify-between items-center text-textGray text-[13px] font-semibold mt-4">
                            <span>#${review.purchase_id}</span>
                            <span>${review.created_at ? new Date(review.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function updatePagination() {
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        function updateCounts(counts) {
            document.getElementById('count-all').textContent = counts.all || 0;
            document.getElementById('count-positive').textContent = counts.positive || 0;
            document.getElementById('count-negative').textContent = counts.negative || 0;
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            
            document.querySelectorAll('#tabs > div').forEach(el => {
                el.classList.remove('tab-active', 'tab-inactive');
                if (el.dataset.tab === tab) {
                    el.classList.add('tab-active');
                } else {
                    el.classList.add('tab-inactive');
                }
            });
            
            loadReviews(tab, currentPage);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            loadReviews(currentTab, currentPage);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            
            if (action === 'write') {
                renderReviewForm();
            } else {
                app.innerHTML = `
                    <button class="w-full bg-yellowBtn text-black font-semibold text-[17px] py-3.5 rounded-[14px] cursor-default">
                        Отзывы
                    </button>
                    
                    <div id="tabs" class="flex gap-2.5">
                        <div class="flex-1 tab-active rounded-[14px] p-3 flex flex-col items-center justify-center cursor-pointer" data-tab="all" onclick="switchTab('all')">
                            <span class="font-bold text-[14px]">Все отзывы</span>
                            <span id="count-all" class="badge-active text-[11px] font-bold px-2.5 py-0.5 rounded-[6px] mt-1">0</span>
                        </div>
                        <div class="flex-1 tab-inactive rounded-[14px] p-3 flex flex-col items-center justify-center cursor-pointer" data-tab="positive" onclick="switchTab('positive')">
                            <span class="font-bold text-[14px]">Позитивные</span>
                            <span id="count-positive" class="badge-positive text-[11px] font-bold px-2.5 py-0.5 rounded-[6px] mt-1">0</span>
                        </div>
                        <div class="flex-1 tab-inactive rounded-[14px] p-3 flex flex-col items-center justify-center cursor-pointer" data-tab="negative" onclick="switchTab('negative')">
                            <span class="font-bold text-[14px]">Негативные</span>
                            <span id="count-negative" class="badge-negative text-[11px] font-bold px-2.5 py-0.5 rounded-[6px] mt-1">0</span>
                        </div>
                    </div>
                    
                    <div id="reviews-container" class="flex flex-col gap-3.5 mt-2"></div>
                    
                    <div id="pagination" class="flex justify-center items-center gap-3 mt-4">
                        <button id="prev-btn" class="pagination-btn" onclick="changePage(-1)">‹</button>
                        <span id="page-info" class="text-white font-bold text-[16px]">1 / 1</span>
                        <button id="next-btn" class="pagination-btn" onclick="changePage(1)">›</button>
                    </div>
                `;
                
                loadReviews('all', 1);
            }
        });
    </script>
</body>
</html>
