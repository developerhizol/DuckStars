<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отзывы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0F0F11;
            color: white;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: 16px;
        }
        
        .emoji-gif {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 6px;
        }
        
        .empty-gif {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin: 0 auto 16px;
            display: block;
        }
        
        .empty-text {
            font-size: 16px;
            font-weight: 600;
            color: #72767A;
            text-align: center;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
        
        .tab-active {
            background: #FFD633 !important;
            color: #111 !important;
        }
        
        .tab-active .badge {
            background: #d4b322 !important;
            color: #111 !important;
        }
        
        .tab-inactive {
            background: #1C1C1E !important;
            color: white !important;
        }
        
        .tab-inactive .badge-positive {
            background: #1A2F22 !important;
            color: #4ADE80 !important;
        }
        
        .tab-inactive .badge-negative {
            background: #321A1A !important;
            color: #F87171 !important;
        }
        
        .tab-inactive .badge {
            background: #2a2a2e !important;
            color: #72767A !important;
        }
        
        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 6px;
            margin-top: 4px;
            min-width: 20px;
            text-align: center;
        }
        
        .badge-positive {
            background: #1A2F22;
            color: #4ADE80;
        }
        
        .badge-negative {
            background: #321A1A;
            color: #F87171;
        }
        
        .card-border {
            border: 1px solid #304D36;
        }
        
        .pagination-btn {
            background: #1C1C1E;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            min-width: 36px;
            text-align: center;
            transition: all 0.2s;
        }
        
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .pagination-btn:not(:disabled):active {
            transform: scale(0.94);
        }

        .rating-btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .rating-btn.good {
            background: #1A2F22;
            color: #4ADE80;
            border-color: #4ADE80;
        }
        
        .rating-btn.good.selected {
            background: #4ADE80;
            color: #111;
            border-color: #4ADE80;
        }
        
        .rating-btn.bad {
            background: #321A1A;
            color: #F87171;
            border-color: #F87171;
        }
        
        .rating-btn.bad.selected {
            background: #F87171;
            color: #111;
            border-color: #F87171;
        }
        
        .rating-btn:active {
            transform: scale(0.96);
        }

        textarea {
            background: #1C1C1E;
            border: 1px solid #2a2a2e;
            border-radius: 12px;
            color: white;
            padding: 14px;
            padding-left: 18px;
            width: 100%;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        textarea:focus {
            outline: none;
            border-color: #FFD633;
        }
        
        textarea::placeholder {
            color: #72767A;
            font-size: 14px;
            padding-left: 2px;
        }

        .submit-btn {
            background: #FFD633;
            color: #111;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .submit-btn:active {
            transform: scale(0.96);
        }
        
        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .empty-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 45vh;
            width: 100%;
            padding: 20px 0;
        }

        .hidden {
            display: none !important;
        }
        
        .tab {
            padding: 12px 8px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 0;
        }
        
        .tab:active {
            transform: scale(0.96);
        }
        
        .tab span:first-child {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .review-card {
            background: #151618;
            border: 1px solid #304D36;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .review-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        
        .review-item span {
            color: #72767A;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .review-status {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1A2F22;
            padding: 4px 10px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        
        .review-status span {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .review-text {
            font-size: 15px;
            font-weight: 700;
            color: white;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #72767A;
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }
        
        .review-footer span:first-child {
            font-weight: 700;
        }

        .header-btn {
            width: 100%;
            background: #FFD633;
            color: #111;
            font-weight: 700;
            font-size: 17px;
            padding: 14px 0;
            border-radius: 14px;
            text-align: center;
            border: none;
            cursor: default;
        }

        .form-container {
            background: #151618;
            border: 1px solid #304D36;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .form-container p {
            color: #72767A;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .form-container .rating-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .form-container .rating-buttons .rating-btn {
            flex: 1;
        }

        #rating-status {
            text-align: center;
            font-size: 14px;
            color: #72767A;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-[480px] mx-auto flex flex-col gap-4">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const userId = urlParams.get('user_id');
        const purchaseId = urlParams.get('purchase_id');
        const orderNumber = urlParams.get('order_number');

        const API_BASE = 'https://duckstars.bothost.tech';
        const REVIEWS_WEBAPP_URL = 'https://duckstars.bothost.tech/';

        const TYPE_GIFS = {
            'stars': '/public/stars.gif',
            'premium': '/public/premium.gif'
        };

        let currentTab = 'all';
        let currentPage = 1;
        let totalPages = 1;
        let selectedRating = null;
        let isSubmitting = false;
        let totalReviews = 0;

        function getTypeGif(type) {
            return TYPE_GIFS[type] || '/public/stars.gif';
        }

        function renderReviewForm() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="header-btn">
                    <i class="fas fa-pen" style="margin-right: 8px;"></i> Оставить отзыв
                </div>
                
                <div class="form-container">
                    <p>Выберите оценку:</p>
                    
                    <div class="rating-buttons">
                        <button class="rating-btn good" onclick="selectRating('good')">
                            <i class="fas fa-thumbs-up"></i> Хорошо
                        </button>
                        <button class="rating-btn bad" onclick="selectRating('bad')">
                            <i class="fas fa-thumbs-down"></i> Плохо
                        </button>
                    </div>
                    
                    <div id="rating-status"></div>
                    
                    <textarea id="review-text" placeholder="Расскажите подробнее о вашем опыте... (необязательно)"></textarea>
                    
                    <button class="submit-btn" id="submit-review" onclick="submitReview()" disabled>
                        <i class="fas fa-paper-plane"></i> Отправить отзыв
                    </button>
                </div>
                
                <button onclick="goToReviews()" class="text-[#72767A] text-center text-sm py-2 hover:text-white transition">
                    <i class="fas fa-arrow-left"></i> Назад к отзывам
                </button>
            `;
        }

        function selectRating(rating) {
            if (isSubmitting) return;
            
            selectedRating = rating;
            const goodBtn = document.querySelector('.rating-btn.good');
            const badBtn = document.querySelector('.rating-btn.bad');
            const submitBtn = document.getElementById('submit-review');
            
            goodBtn.classList.remove('selected');
            badBtn.classList.remove('selected');
            
            if (rating === 'good') {
                goodBtn.classList.add('selected');
            } else {
                badBtn.classList.add('selected');
            }
            
            submitBtn.disabled = false;
        }

        async function submitReview() {
            if (!selectedRating || isSubmitting) return;
            
            const text = document.getElementById('review-text').value.trim();
            const submitBtn = document.getElementById('submit-review');
            
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
            
            try {
                const response = await fetch(`${API_BASE}/api/submit_review`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        purchase_id: purchaseId,
                        order_number: orderNumber || '',
                        rating: selectedRating === 'good' ? 5 : 1,
                        text: text || 'Без комментария'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const status = document.getElementById('rating-status');
                    status.innerHTML = '<i class="fas fa-check-circle"></i> Отзыв успешно отправлен! Спасибо!';
                    status.style.color = '#4ADE80';
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Отправлено';
                    submitBtn.style.background = '#4ADE80';
                    
                    setTimeout(() => {
                        window.location.href = REVIEWS_WEBAPP_URL;
                    }, 1500);
                } else {
                    alert('Ошибка при отправке отзыва: ' + data.error);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить отзыв';
                    isSubmitting = false;
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить отзыв';
                isSubmitting = false;
            }
        }

        function goToReviews() {
            window.location.href = REVIEWS_WEBAPP_URL;
        }

        async function loadReviews(tab, page) {
            const params = new URLSearchParams({
                tab: tab,
                page: page,
                limit: 5
            });
            
            try {
                const response = await fetch(`${API_BASE}/api/reviews?${params}`);
                const data = await response.json();
                
                totalPages = data.total_pages || 1;
                totalReviews = data.counts?.all || 0;
                renderReviews(data.reviews || [], data.counts);
                updatePagination();
                updateCounts(data.counts || { all: 0, positive: 0, negative: 0 });
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                document.getElementById('reviews-container').innerHTML = `
                    <div class="text-center text-[#72767A] py-8">
                        <i class="fas fa-exclamation-triangle" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
                        <p>Ошибка загрузки отзывов</p>
                    </div>
                `;
            }
        }

        function renderReviews(reviews, counts) {
            const container = document.getElementById('reviews-container');
            const tabsContainer = document.getElementById('tabs-container');
            const paginationContainer = document.getElementById('pagination-container');
            
            const hasAnyReviews = (counts && counts.all > 0) || totalReviews > 0;
            
            if (hasAnyReviews) {
                if (tabsContainer) tabsContainer.classList.remove('hidden');
            } else {
                if (tabsContainer) tabsContainer.classList.add('hidden');
            }
            
            if (!reviews || reviews.length === 0) {
                if (paginationContainer) paginationContainer.classList.add('hidden');
                
                let emptyGif = '/public/cry.gif';
                let emptyText = 'ОТЗЫВОВ ПОКА ЧТО НЕТ, НО ЭТО ПОКА';
                
                if (currentTab === 'positive') {
                    emptyGif = '/public/cry.gif';
                    emptyText = 'ПОЗИТИВНЫХ ОТЗЫВОВ ПОКА НЕТ';
                } else if (currentTab === 'negative') {
                    emptyGif = '/public/fun.gif';
                    emptyText = 'НЕГАТИВНЫХ ОТЗЫВОВ НЕТ';
                }
                
                container.innerHTML = `
                    <div class="empty-container">
                        <img src="${emptyGif}" alt="empty" class="empty-gif">
                        <p class="empty-text">${emptyText}</p>
                    </div>
                `;
                return;
            }
            
            if (paginationContainer) paginationContainer.classList.remove('hidden');
            
            let html = '';
            reviews.forEach(review => {
                const typeGif = getTypeGif(review.type);
                let displayItem = review.item;
                
                const isPositive = review.rating >= 4;
                const statusText = isPositive ? 'ХОРОШО' : 'ПЛОХО';
                const statusColor = isPositive ? '#4ADE80' : '#F87171';
                const statusBg = isPositive ? '#1A2F22' : '#321A1A';
                
                html += `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-item">
                                <img src="${typeGif}" alt="icon" class="emoji-gif">
                                <span>${displayItem}</span>
                            </div>
                            <div class="review-status" style="background: ${statusBg};">
                                <i class="fas ${isPositive ? 'fa-check' : 'fa-times'}" style="color: ${statusColor}; font-size: 10px;"></i>
                                <span style="color: ${statusColor}">${statusText}</span>
                            </div>
                        </div>
                        <div class="review-text">${review.text}</div>
                        <div class="review-footer">
                            <span>#${review.order_number || review.purchase_id}</span>
                            <span>${review.created_at ? new Date(review.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function updatePagination() {
            const pageInfo = document.getElementById('page-info');
            if (pageInfo) {
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
            }
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            if (prevBtn) prevBtn.disabled = currentPage <= 1;
            if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
        }

        function updateCounts(counts) {
            const allEl = document.getElementById('count-all');
            const posEl = document.getElementById('count-positive');
            const negEl = document.getElementById('count-negative');
            if (allEl) allEl.textContent = counts.all || 0;
            if (posEl) posEl.textContent = counts.positive || 0;
            if (negEl) negEl.textContent = counts.negative || 0;
            
            totalReviews = counts.all || 0;
        }

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            currentPage = 1;
            
            document.querySelectorAll('.tab').forEach(el => {
                el.classList.remove('tab-active', 'tab-inactive');
                if (el.dataset.tab === tab) {
                    el.classList.add('tab-active');
                } else {
                    el.classList.add('tab-inactive');
                }
            });
            
            loadReviews(tab, currentPage);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            loadReviews(currentTab, currentPage);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            
            if (action === 'write') {
                renderReviewForm();
            } else {
                app.innerHTML = `
                    <div class="header-btn">
                        Отзывы
                    </div>
                    
                    <div id="tabs-container">
                        <div class="flex gap-2.5">
                            <div class="tab tab-active" data-tab="all" onclick="switchTab('all')">
                                <span>Все отзывы</span>
                                <span id="count-all" class="badge">0</span>
                            </div>
                            <div class="tab tab-inactive" data-tab="positive" onclick="switchTab('positive')">
                                <span>Позитивные</span>
                                <span id="count-positive" class="badge badge-positive">0</span>
                            </div>
                            <div class="tab tab-inactive" data-tab="negative" onclick="switchTab('negative')">
                                <span>Негативные</span>
                                <span id="count-negative" class="badge badge-negative">0</span>
                            </div>
                        </div>
                    </div>
                    
                    <div id="reviews-container" class="flex flex-col gap-3.5 mt-2"></div>
                    
                    <div id="pagination-container">
                        <div class="flex justify-center items-center gap-3 mt-4">
                            <button id="prev-btn" class="pagination-btn" onclick="changePage(-1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <span id="page-info" class="text-white font-bold text-[15px]">1 / 1</span>
                            <button id="next-btn" class="pagination-btn" onclick="changePage(1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
                
                loadReviews('all', 1);
            }
        });
    </script>
</body>
</html>
